name: Run Cafe Data Script Daily

# Set environment variable to force Node.js 24 (future-proof)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 0 * * *"  # daily at 12:00 AM UTC
  workflow_dispatch:    

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4️⃣ Run your Python script
      - name: Run script
        run: python main.py
        env:
          # Make your API key available securely
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      # 5️⃣ Commit and push updated CSV
      - name: Commit and push CSV
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add adelaide_cafes_dataset.csv
          git commit -m "Daily data update" || echo "No changes"
          git push
